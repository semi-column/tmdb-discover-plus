name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "❌ Deployment cancelled. You must type 'deploy' to confirm."
          exit 1

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for Oracle VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/oracle_vm_key
          chmod 600 ~/.ssh/oracle_vm_key
          ssh-keyscan -H "${{ secrets.ORACLE_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Oracle VM
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USER: ${{ secrets.ORACLE_VM_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=yes "$ORACLE_VM_USER@$ORACLE_VM_HOST" "DEPLOY_SHA='$DEPLOY_SHA' bash -s" << 'EOF'
          set -euo pipefail

          cd /opt/tmdb-discover-plus
          git fetch origin main
          git reset --hard "$DEPLOY_SHA"
          git clean -fd -e .env -e .env.pre-supplied-config

          version=$(sed -n 's/  "version": "\([^"]*\)".*/\1/p' package.json | head -n 1)
          printf '{\n  "version": "%s",\n  "tag": "manual",\n  "channel": "nightly",\n  "commitHash": "%s",\n  "buildTime": "%s"\n}\n' \
            "$version" "${DEPLOY_SHA:0:7}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > server/src/metadata.json

          docker compose -f docker-compose.production.yml up -d --build --remove-orphans

          ok=0
          for i in $(seq 1 45); do
            if docker exec tmdb-discover-plus wget -q --spider http://127.0.0.1:7000/health; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "Health check failed after restart"
            docker compose -f docker-compose.production.yml ps
            docker logs --tail 120 tmdb-discover-plus || true
            exit 1
          fi

          echo "Manual deploy completed on Oracle VM"
          EOF

      - name: Deployment Summary
        run: |
          echo "## 🚀 Manual Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** Oracle VM" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://tmdb-discover-plus.duckdns.org/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
