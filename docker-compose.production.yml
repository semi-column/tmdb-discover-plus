services:
  tmdb-discover-plus:
    build:
      context: .
      dockerfile: Dockerfile.docker
    container_name: tmdb-discover-plus
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 7000
      REDIS_URL: redis://redis:6379
    expose:
      - "7000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tmdb-discover-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: tmdb-discover-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      tmdb-discover-plus:
        condition: service_healthy

volumes:
  redis_data:
  caddy_data:
  caddy_config: